<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="login-container">
        <form id="loginForm">
            <h1>Login</h1> <!-- Error message container -->
            <div id="message" class="error-message"></div>
            <div class="input-group"> <input type="text" id="username" placeholder="Usuário" required> </div>
            <div class="input-group"> <input type="password" id="password" placeholder="Senha" required> </div> <button
                type="submit">Acessar</button>
            <p class="sing-link">Não tem uma conta? <a href="">Criar conta</a></p>
        </form>
    </div>
    <script src="/javaScript/pages/login.js"></script>
</body>

</html>
